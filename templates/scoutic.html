<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <title>Scoutic | CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --scoutic-green: #16a085; --dark-bg: #0f172a; }
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            font-family: 'Segoe UI', sans-serif; margin: 0;
        }
        
        /* Navbar Scoutic */
        .scoutic-nav {
            background: var(--dark-bg); color: white;
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-scoutic { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; color: white; text-decoration: none; }
        .logo-scoutic span { color: var(--scoutic-green); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        
        /* Tarjeta de Control */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-left: 4px solid var(--scoutic-green); }
        .stat-card small { color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
        .stat-card div { font-size: 1.8rem; font-weight: 900; color: var(--dark-bg); }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        th { background: #f1f5f9; color: #475569; padding: 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; color: #1e293b; }
        
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .En-progreso { background: #fef3c7; color: #92400e; }
        .Pendiente { background: #e2e8f0; color: #475569; }
        .Terminado { background: #dcfce7; color: #166534; }

        .btn-new { background: var(--scoutic-green); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-new:hover { background: #12876f; transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="scoutic-nav">
    <a href="/" class="logo-scoutic">SCOUT<span>IC</span></a>
    <div class="nav-user"><i class="fa-regular fa-circle-user"></i> Kike Analista</div>
</nav>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card"><small>Total Jugadores</small><div>124</div></div>
        <div class="stat-card"><small>Informes este mes</small><div>12</div></div>
        <div class="stat-card"><small>Pendientes</small><div>3</div></div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--dark-bg); margin:0;">{{ textos.titulo_crm }}</h2>
        <a href="javascript:void(0)" class="btn-new" onclick="abrirModal()"><i class="fa-solid fa-plus"></i> {{ textos.nuevo_jugador }}</a>
    </div>

    <div id="modalInforme" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:400px; position:relative;">
            <h3 style="color:#0f172a; margin-top:0;">Crear Nuevo Informe</h3>
            <form action="/scoutic/nuevo" method="POST">
                <div style="margin-bottom:15px;">
                    <label style="display:block; font-size:0.8rem; font-weight:bold;">Nombre del Jugador</label>
                    <input type="text" name="nombre" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:5px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block; font-size:0.8rem; font-weight:bold;">Posición</label>
                    <input type="text" name="posicion" placeholder="Ej: MCO, DC..." required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:5px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block; font-size:0.8rem; font-weight:bold;">Equipo</label>
                    <input type="text" name="equipo" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:5px;">
                </div>
                <button type="submit" class="btn-new" style="width:100%; border:none; cursor:pointer;">Guardar en Scoutic</button>
                <button type="button" onclick="cerrarModal()" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; cursor:pointer;">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
    function abrirModal() { document.getElementById('modalInforme').style.display = 'flex'; }
    function cerrarModal() { document.getElementById('modalInforme').style.display = 'none'; }
    </script>

    <table>
        <thead>
            <tr>
                <th>Jugador</th>
                <th>Posición</th>
                <th>Equipo</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for j in jugadores %}
            <tr>
                <td><strong>{{ j.nombre }}</strong></td>
                <td><code style="background:#f1f5f9; padding:2px 5px; border-radius:4px;">{{ j.posicion }}</code></td>
                <td>{{ j.equipo }}</td>
                <td><span class="badge {{ j.estado.replace(' ', '-') }}">{{ j.estado }}</span></td>
                <td>
                    <button style="border:none; background:none; cursor:pointer; color:#64748b;"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button style="border:none; background:none; cursor:pointer; color:#e11d48;"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
