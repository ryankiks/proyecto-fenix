<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BeSoccer Reports Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1db954; --dark: #0f172a; --card-bg: #1e293b; }
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px; /* Tamaño de la cuadrícula */
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
        }
        
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; font-size: 2.2rem; margin-bottom: 40px; letter-spacing: -1px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
        }
        .card:hover { transform: scale(1.02); border-color: var(--primary); }

        .image-container { position: relative; height: 220px; overflow: hidden; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }

        .price-premium {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ffffff;
            color: #0f172a; /* Azul muy oscuro para contraste */
            padding: 6px 16px;
            border-radius: 12px; /* Un poco menos redondeado para que parezca una etiqueta de BeSoccer */
            font-weight: 900;
            font-size: 1.3rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); /* Sombra más profunda para que "flote" */
            border: 2px solid #16a085; /* Borde con el verde BeSoccer */
            z-index: 10;
        }

        .currency {
            font-size: 0.9rem;
            margin-left: 2px;
            color: #64748b; /* El símbolo de euro en un gris suave para que resalte el número */
        }

        .card-body { padding: 25px; flex-grow: 1; }
        .card-title { font-size: 1.2rem; margin: 0 0 10px 0; font-weight: 800; color: #f8fafc; }
        .description { color: #94a3b8; font-size: 0.85rem; line-height: 1.5; margin-bottom: 20px; }

        .actions { padding: 0 25px 25px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px; }
        
        /* Estilos para el mensaje de agradecimiento */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .modal-content h2 { margin-top: 0; color: #1e293b; }
        .modal-content p { color: #64748b; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }

        .btn { padding: 10px; border-radius: 10px; text-decoration: none; text-align: center; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.2s; border: none; }
        .btn-sample { background: rgba(255,255,255,0.1); color: white; }
        .btn-sample:hover { background: rgba(255,255,255,0.2); }
        .btn-buy { background: var(--primary); color: #000; }
        .btn-buy:hover { background: #1ed760; }
        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px); /* Efecto cristal */
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>REPOSITORIO DE INFORMES</h1>
        <div class="grid">
            {% for info in informes %}
            <div class="card">
                <div class="image-container">
                    <img src="{{ info.img }}" alt="Portada">
                    <div class="price-premium">{{ info.precio }}<span class="currency">€</span></div>
                </div>
                <div class="card-body">
                    <h2 class="card-title">{{ info.titulo }}</h2>
                    <p class="description">{{ info.descripcion }}</p>
                </div>
                <div class="actions">
                    <a href="{{ url_for('static', filename='muestras/' + info.archivo) }}" 
                    class="btn btn-sample" 
                    download 
                    onclick="showThanks(event)">
                    Ver Muestra
                    </a>
                    <button class="btn btn-buy" onclick="alert('Iniciando pago...')">Comprar</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
        <div id="thanksModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <i class="fa-solid fa-circle-check" style="color: #16a085; font-size: 3rem; margin-bottom: 15px;"></i>
            <h2>¡Gracias por descargar la muestra!</h2>
            <p>¿Te ha gustado lo que has visto? Consigue el informe completo con todos los datos avanzados y conclusiones del analista.</p>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn btn-sample">Seguir mirando</button>
                <button onclick="goToPurchase()" class="btn btn-buy">Comprar ahora</button>
            </div>
        </div>
    </div>
</body>
</html>

<script>
function showThanks(event) {
    // Mostramos el modal
    document.getElementById('thanksModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('thanksModal').style.display = 'none';
}

function goToPurchase() {
    closeModal();
    alert("Redirigiendo a la pasarela de pago...");
}
</script>
