<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marketplace de Informes | Proyecto Fénix</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 40px; }
        
        /* La rejilla mágica */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            overflow: hidden; 
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-10px); }

        .card-header { padding: 15px; color: white; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .card-body { padding: 20px; flex-grow: 1; }
        .card-title { font-size: 18px; color: #2c3e50; margin: 0 0 15px 0; min-height: 50px; }
        .price { font-size: 22px; font-weight: bold; color: #16a085; }
        
        .btn-buy { 
            background: #2c3e50; color: white; text-align: center; 
            padding: 12px; text-decoration: none; border-radius: 0 0 12px 12px;
            font-weight: bold; transition: background 0.3s;
        }
        .btn-buy:hover { background: #16a085; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📑 Repositorio de Informes BeSoccer</h1>
        
        <div class="grid">
            {% for info in informes %}
            <div class="card">
                <div class="card-header" style="background-color: {{ info.color }}">
                    {{ info.tipo }}
                </div>
                <div class="card-body">
                    <h2 class="card-title">{{ info.titulo }}</h2>
                    <p class="price">{{ info.precio }}€</p>
                    
                </div>
                <a href="#" class="btn-buy" onclick="alert('Redirigiendo a pasarela de pago para el informe ID: {{ info.id }}')">
                    COMPRAR INFORME
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
